<svg width="128" height="128" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="awsOrange" x1="24" y1="18" x2="96" y2="102">
      <stop offset="0%" stop-color="#FFB84D"></stop>
      <stop offset="55%" stop-color="#FF9900"></stop>
      <stop offset="100%" stop-color="#FF6A00"></stop>
    </linearGradient>

    <linearGradient id="coolGray" x1="30" y1="20" x2="90" y2="100">
      <stop offset="0%" stop-color="#E9EEF5"></stop>
      <stop offset="100%" stop-color="#B9C3D4"></stop>
    </linearGradient>

    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(60 60) rotate(90) scale(54)">
      <stop offset="0%" stop-color="#FF9900" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#FF9900" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- soft glow -->
  <circle cx="60" cy="60" r="54" fill="url(#glow)"></circle>

  <!-- rocket body -->
  <path d="M60 18
